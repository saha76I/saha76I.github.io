<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>saha.rip</title>  <style>

    :root{
      --line:rgba(255,255,255,.06);
      --text:#f6f6f6;
      --muted:#a8a8a8;
      --faint:#747474;
      --glow:0 0 14px rgba(255,255,255,.24),0 0 28px rgba(255,255,255,.10);
      --accent:#dc143c;
      --rx:0deg;
      --ry:0deg;
      --mx:50%;
      --my:50%;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%}
    body{min-height:100vh;display:grid;place-items:center;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#000;color:var(--text);overflow:hidden;perspective:1600px}
    .bg-video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;filter:grayscale(1) contrast(1.05) brightness(.22);pointer-events:none}
    body::before{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at center, transparent 42%, rgba(0,0,0,.58) 100%),linear-gradient(180deg, rgba(0,0,0,.18), rgba(0,0,0,.46));z-index:1}
    .noise,.vignette{position:fixed;inset:0;pointer-events:none}
    .noise{opacity:.05;background-image:radial-gradient(rgba(255,255,255,.9) .45px, transparent .6px);background-size:7px 7px;mix-blend-mode:soft-light}
    .vignette{background:radial-gradient(circle at center, transparent 42%, rgba(0,0,0,.62) 100%)}
    .speaker{position:fixed;left:12px;top:12px;width:42px;height:42px;border-radius:14px;border:1px solid var(--line);background:rgba(9,9,9,.86);display:grid;place-items:center;color:#fff;box-shadow:0 8px 24px rgba(0,0,0,.35);z-index:4}
    .wrap{width:min(92vw,540px);position:relative;z-index:3}
    .tilt-stage{position:relative;transform-style:preserve-3d;transform:rotateX(var(--rx)) rotateY(var(--ry));transition:transform 130ms ease;will-change:transform}
    .panel,.player{background:linear-gradient(180deg,rgba(8,8,8,.9),rgba(4,4,4,.92));border:1px solid rgba(255,255,255,.05);border-radius:20px;box-shadow:0 18px 50px rgba(0,0,0,.42)}
    .panel{padding:22px 20px 16px;position:relative;overflow:hidden;transform-style:preserve-3d}
    .panel::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at var(--mx) var(--my), rgba(255,255,255,.06), transparent 26%);opacity:.8;pointer-events:none}
    .lift{transform:translateZ(24px)}
    .lift-sm{transform:translateZ(14px)}
    .top{display:flex;gap:14px;align-items:center}
    .static-top{transform:none !important}
    .avatar{width:92px;height:92px;flex:0 0 92px;border-radius:50%;overflow:hidden;border:1px solid rgba(255,255,255,.08);background:#111;box-shadow:0 0 18px rgba(255,255,255,.06)}
    .avatar img,.cover img,.presence-widget img,.server-icon img{width:100%;height:100%;display:block;object-fit:cover;object-position:center}
    .meta{min-width:0;display:flex;flex-direction:column;align-items:flex-start}
    .name-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .name{margin:0;font-size:2rem;line-height:1;font-weight:800;letter-spacing:.02em;text-shadow:var(--glow);min-height:1em}
    .cross{font-size:1.8rem;opacity:.92;text-shadow:var(--glow)}
    .verify{width:22px;height:22px;border-radius:999px;background:linear-gradient(180deg,var(--accent),#870d25);display:grid;place-items:center;font-size:.78rem;font-weight:700;box-shadow:0 0 12px rgba(220,20,60,.35),0 0 24px rgba(220,20,60,.14)}
    .bio{margin:8px 0 0;font-size:1rem;font-weight:700;text-shadow:0 0 14px rgba(255,255,255,.12);min-height:1.2em}
    .name,.bio{white-space:nowrap}
    .caret{display:inline-block;width:2px;height:.95em;margin-left:4px;vertical-align:-0.08em;background:rgba(255,255,255,.9);box-shadow:0 0 10px rgba(255,255,255,.25);animation:caretBlink .9s steps(1) infinite}
    .bio-caret{height:.9em;background:rgba(255,255,255,.78)}
    @keyframes caretBlink{50%{opacity:0}}
    #typedName{display:inline-block;min-width:6ch}
    #typedBio{display:inline-block;min-width:33ch}
    .widgets{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px;align-items:stretch}
    .widget{min-height:84px;border-radius:18px;background:linear-gradient(180deg,rgba(11,11,11,.94),rgba(6,6,6,.94));border:1px solid var(--line);padding:12px 14px;display:flex;align-items:center}
    .presence-widget{padding:0;overflow:hidden;aspect-ratio:16/9;min-height:auto;background:#090909}
    .presence-widget img{filter:grayscale(1) contrast(1.04) brightness(.92)}
    .server{display:grid;grid-template-columns:54px 1fr;gap:10px;width:100%;align-items:center}
    .server-icon{width:54px;height:54px;border-radius:16px;overflow:hidden;background:linear-gradient(135deg,#262626,#0d0d0d);border:1px solid rgba(255,255,255,.08);display:grid;place-items:center}
    .server h3{margin:0;font-size:1rem}
    .server small{display:block;color:var(--muted);margin-top:3px}
    .online{display:flex;gap:8px;align-items:center;color:var(--muted);font-size:.78rem;margin-top:4px}
    .dot{width:7px;height:7px;border-radius:999px;background:var(--accent);box-shadow:0 0 10px rgba(220,20,60,.52),0 0 18px rgba(220,20,60,.22)}
    .join{display:inline-flex;margin-top:6px;padding:4px 10px;border-radius:999px;background:linear-gradient(180deg,var(--accent),#8b0f29);color:#fff;font-size:.75rem;font-weight:700;box-shadow:0 0 10px rgba(220,20,60,.32)}
    .icons{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;padding:22px 0 10px}
    .icon-link{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;text-decoration:none;color:#fff;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);box-shadow:0 0 16px rgba(255,255,255,.08);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:transform .18s ease, background .18s ease, border-color .18s ease}
    .icon-link i{color:#fff !important;font-size:18px;line-height:1}
    .icon-link svg{width:18px;height:18px;display:block;fill:currentColor;color:#fff;filter:drop-shadow(0 0 6px rgba(255,255,255,.75))}
    .icon-link:hover{transform:translateY(-1px);background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2)}
    .views{display:flex;align-items:center;gap:8px;color:#efefef;font-size:.92rem;padding-top:2px}
    .player{margin-top:12px;padding:10px 14px;display:grid;grid-template-columns:50px 1fr auto;gap:14px;align-items:center;transform:translateZ(12px)}
    .cover{width:50px;height:50px;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.08);background:#111;box-shadow:0 0 16px rgba(255,255,255,.04)}
    .track-top{display:flex;justify-content:space-between;gap:10px;color:#fff;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.92rem}
    .bar{height:3px;background:#303030;border-radius:999px;margin-top:8px;position:relative;cursor:pointer;--progress:0%}
    .bar::after{content:"";position:absolute;left:0;top:0;bottom:0;width:var(--progress);border-radius:999px;background:#d8d8d8}
    .controls{display:flex;align-items:center;gap:14px;color:#fff}
    .controls button{appearance:none;border:0;background:transparent;color:#fff;font-size:1.1rem;cursor:pointer;padding:0;line-height:1;text-shadow:var(--glow)}
    .hint{margin-top:12px;text-align:center;color:var(--faint);font-size:.8rem;line-height:1.5}
    body.cursor-glow,body.cursor-glow *{cursor:none !important}
    .cursor-dot{position:fixed;left:0;top:0;width:14px;height:14px;border-radius:999px;background:rgba(255,255,255,.92);box-shadow:0 0 10px rgba(255,255,255,.82),0 0 24px rgba(255,255,255,.34);pointer-events:none;z-index:9999;transform:translate(-50%,-50%);opacity:0;transition:opacity 120ms ease, transform 60ms linear}
    .cursor-dot.active{opacity:1}
    @media (max-width:560px){
      .top{align-items:flex-start}.avatar{width:74px;height:74px;flex-basis:74px}.name{font-size:1.65rem}
      .widgets{grid-template-columns:1fr}
      .player{grid-template-columns:44px 1fr;grid-template-areas:"cover info" "controls controls"}
      .cover{grid-area:cover;width:44px;height:44px}.track{grid-area:info}.controls{grid-area:controls;justify-content:flex-end}
      #typedBio{min-width:22ch}
    }
    
    .enter-gate{position:fixed;inset:0;z-index:10000;display:grid;place-items:center;background:radial-gradient(circle at center, rgba(10,10,10,.78), rgba(0,0,0,.96));backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:opacity .35s ease, visibility .35s ease}
    .enter-button{appearance:none;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.06);color:#fff;padding:16px 28px;border-radius:999px;font:800 14px/1 Inter,ui-sans-serif,system-ui,sans-serif;letter-spacing:.28em;cursor:pointer;box-shadow:0 0 24px rgba(255,255,255,.08), inset 0 0 18px rgba(255,255,255,.03);transition:transform .18s ease, background .18s ease, border-color .18s ease, box-shadow .18s ease}
    .enter-button:hover{transform:translateY(-1px) scale(1.02);background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.28);box-shadow:0 0 30px rgba(255,255,255,.12), inset 0 0 18px rgba(255,255,255,.04)}
    .enter-button:focus-visible{outline:2px solid rgba(255,255,255,.75);outline-offset:4px}
    body.gate-locked .wrap,body.gate-locked .speaker{opacity:0;visibility:hidden;transform:scale(.985);filter:blur(10px);transition:opacity .35s ease, visibility .35s ease, transform .35s ease, filter .35s ease}
    body.gate-open .enter-gate{opacity:0;visibility:hidden;pointer-events:none}
    body.gate-open .wrap,body.gate-open .speaker{opacity:1;visibility:visible;transform:none;filter:none}

    @media (hover:none){.tilt-stage{transform:none !important}body.cursor-glow,body.cursor-glow *{cursor:auto !important}.cursor-dot{display:none}}

  </style>

<script>
  const SETTINGS = {
  "title": "saha.rip",
  "username": "saha",
  "bio": "You have to live with the choices you've made.",
  "quote": "I've pretended long enough that it mattered.",
  "trackName": "The Perfect Girl",
  "views": "1",
  "accent": "#dc143c",
  "wallpaper": "live-wallpaper.mp4",
  "pfp": "pfp.png",
  "leftCardImage": "presence.png",
  "serverIcon": "server-icon.png",
  "songCover": "song-cover.png",
  "songFile": "song.mp3",
  "links": {
    "spotify": "https://open.spotify.com/user/31pbayryktrvwqcsf76epjaqvapu?trackId=5fbQCQt91LsVgXusFS0CCD",
    "twitch": "https://www.twitch.tv/v7ncentt",
    "youtube": "https://www.youtube.com/@v7ncentt",
    "discord": "https://discord.com",
    "anilist": "https://anilist.co/user/v7ncentt/"
  },
  "server": {
    "name": "heaven's castle",
    "platform": "Discord",
    "stats": "213 online • 11,598 members",
    "button": "Join"
  }
};

  function applySettings(s) {
    document.title = s.title || 'saha.rip';
    document.documentElement.style.setProperty('--accent', s.accent || '#dc143c');

    const pfp = document.querySelector('.avatar img');
    const presence = document.querySelector('.presence-widget img');
    const serverIcon = document.querySelector('.server-icon img');
    const cover = document.querySelector('.cover img');
    const audio = document.getElementById('audio');
    const bgVideo = document.getElementById('bgVideo');
    const bgSource = bgVideo ? bgVideo.querySelector('source') : null;

    if (pfp) pfp.src = s.pfp || 'pfp.png';
    if (presence) presence.src = s.leftCardImage || 'presence.png';
    if (serverIcon) serverIcon.src = s.serverIcon || 'server-icon.png';
    if (cover) cover.src = s.songCover || 'song-cover.png';
    if (audio) audio.src = s.songFile || 'song.mp3';
    if (bgVideo && bgSource) {
      bgSource.src = s.wallpaper || 'live-wallpaper.mp4';
      bgVideo.load();
    }

    const links = s.links || {};
    const spotify = document.querySelector('.spotify-link');
    const twitch = document.querySelector('.twitch-link');
    const youtube = document.querySelector('.youtube-link');
    const discord = document.querySelector('.discord-link');
    const anilist = document.querySelector('.anilist-link');
    if (spotify) spotify.href = links.spotify || '#';
    if (twitch) twitch.href = links.twitch || '#';
    if (youtube) youtube.href = links.youtube || '#';
    if (discord) discord.href = links.discord || '#';
    if (anilist) anilist.href = links.anilist || '#';

    const server = s.server || {};
    const serverName = document.querySelector('.server h3');
    const serverPlatform = document.querySelector('.server small');
    const serverStats = document.querySelector('.online span:last-child');
    const serverButton = document.querySelector('.join');
    const trackName = document.querySelector('.track-top span:first-child');
    const views = document.querySelector('.views span:last-child');
    const hint = document.querySelector('.hint');
    if (serverName) serverName.textContent = server.name || '';
    if (serverPlatform) serverPlatform.textContent = server.platform || '';
    if (serverStats) serverStats.textContent = server.stats || '';
    if (serverButton) serverButton.textContent = server.button || 'Join';
    if (trackName) trackName.textContent = s.trackName || '';
    if (views) views.textContent = s.views || '0';
    if (hint) hint.textContent = s.quote || '';
  }
</script>

        <div class="track">
          <div class="track-top"><span id="trackTitle">she wants me dead</span><span><span id="currentTime">0:00</span> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; <span id="duration">0:00</span></span></div>
          <div class="bar" id="progressBar"></div>
        </div>
        <div class="controls"><button type="button" id="restartBtn" aria-label="Neustart">◀</button><button type="button" id="playPauseBtn" aria-label="Play Pause">▶</button><button type="button" id="endBtn" aria-label="Zum Ende">▶</button></div>
      </section>
    </div>
    <p class="hint">in the end there is light in the darkness</p>
  </main>
  <script>
    
    function createTyper(el, text, opts = {}) {
      let i = 0;
      let deleting = false;
      const typeSpeed = opts.typeSpeed || 95;
      const deleteSpeed = opts.deleteSpeed || 50;
      const hold = opts.hold || 1400;
      const gap = opts.gap || 260;
      function tick() {
        el.textContent = text.slice(0, i);
        if (!deleting) {
          if (i < text.length) {
            i += 1;
            setTimeout(tick, typeSpeed);
          } else {
            deleting = true;
            setTimeout(tick, hold);
          }
        } else {
          if (i > 0) {
            i -= 1;
            setTimeout(tick, deleteSpeed);
          } else {
            deleting = false;
            setTimeout(tick, gap);
          }
        }
      }
      tick();
    }

    const typedName = document.getElementById('typedName');
    const typedBio = document.getElementById('typedBio');
    applySettings(SETTINGS);
    createTyper(typedName, SETTINGS.username || 'heaven', { typeSpeed: 110, deleteSpeed: 55, hold: 1500, gap: 280 });
    createTyper(typedBio, SETTINGS.bio || 'The road to heaven feels like hell', { typeSpeed: 58, deleteSpeed: 34, hold: 1700, gap: 380 });


    function enterProfile() {
      if (document.body.classList.contains('gate-open')) return;
      document.body.classList.remove('gate-locked');
      document.body.classList.add('gate-open');
      const gate = document.getElementById('enterGate');
      const audio = document.getElementById('audio');
      if (gate) gate.setAttribute('aria-hidden', 'true');
      if (audio) {
        audio.muted = false;
        const p = audio.play();
        if (p && typeof p.catch === 'function') p.catch(() => {});
      }
    }

    const enterGate = document.getElementById('enterGate');
    const enterButton = document.getElementById('enterButton');
    if (enterGate) {
      enterGate.addEventListener('click', enterProfile);
      enterGate.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          enterProfile();
        }
      });
    }
    if (enterButton) enterButton.addEventListener('click', enterProfile);

    const tilt = document.getElementById('tiltCard');
    const maxTilt = 14;
    function updateTilt(x, y, rect) {
      const px = (x - rect.left) / rect.width;
      const py = (y - rect.top) / rect.height;
      const ry = (px - 0.5) * maxTilt * 2;
      const rx = (0.5 - py) * maxTilt * 2;
      tilt.style.setProperty('--rx', `${rx.toFixed(2)}deg`);
      tilt.style.setProperty('--ry', `${ry.toFixed(2)}deg`);
      tilt.style.setProperty('--mx', `${(px * 100).toFixed(1)}%`);
      tilt.style.setProperty('--my', `${(py * 100).toFixed(1)}%`);
    }
    tilt.addEventListener('mousemove', (e) => {
      const rect = tilt.getBoundingClientRect();
      updateTilt(e.clientX, e.clientY, rect);
    });
    tilt.addEventListener('mouseleave', () => {
      tilt.style.setProperty('--rx', '0deg');
      tilt.style.setProperty('--ry', '0deg');
      tilt.style.setProperty('--mx', '50%');
      tilt.style.setProperty('--my', '50%');
    });
    tilt.addEventListener('touchmove', (e) => {
      const t = e.touches[0];
      if (!t) return;
      const rect = tilt.getBoundingClientRect();
      updateTilt(t.clientX, t.clientY, rect);
    }, {passive:true});
    tilt.addEventListener('touchend', () => {
      tilt.style.setProperty('--rx', '0deg');
      tilt.style.setProperty('--ry', '0deg');
    });

    const audio = document.getElementById('audio');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const restartBtn = document.getElementById('restartBtn');
    const endBtn = document.getElementById('endBtn');
    const currentTimeEl = document.getElementById('currentTime');
    const durationEl = document.getElementById('duration');
    const progressBar = document.getElementById('progressBar');

    audio.volume = 0.10;
    audio.autoplay = true;
    audio.loop = true;

    
    async function tryAutoplay() {
      try {
        await audio.play();
        playPauseBtn.textContent = '❚❚';
      } catch (e) {
        playPauseBtn.textContent = '▶';
      }
    }
    document.addEventListener('DOMContentLoaded', tryAutoplay, { once:true });
    window.addEventListener('load', tryAutoplay, { once:true });
    document.addEventListener('click', tryAutoplay, { once:true });
    document.addEventListener('pointerdown', tryAutoplay, { once:true });

    function fmt(sec) {
      if (!isFinite(sec)) return '0:00';
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }
    function updateProgress() {
      const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
      progressBar.style.setProperty('--progress', `${pct}%`);
      currentTimeEl.textContent = fmt(audio.currentTime);
    }
    audio.addEventListener('loadedmetadata', () => {
      durationEl.textContent = fmt(audio.duration);
      updateProgress();
    });
    audio.addEventListener('timeupdate', updateProgress);
    audio.addEventListener('ended', () => {
      playPauseBtn.textContent = '▶';
    });
    playPauseBtn.addEventListener('click', async () => {
      if (audio.paused) {
        try { await audio.play(); playPauseBtn.textContent = '❚❚'; } catch(e) {}
      } else {
        audio.pause();
        playPauseBtn.textContent = '▶';
      }
    });
    restartBtn.addEventListener('click', () => {
      audio.currentTime = 0;
      updateProgress();
    });
    endBtn.addEventListener('click', () => {
      if (audio.duration) audio.currentTime = Math.max(0, audio.duration - 1);
    });
    progressBar.addEventListener('click', (e) => {
      const rect = progressBar.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      if (audio.duration) audio.currentTime = Math.max(0, Math.min(audio.duration, pct * audio.duration));
    });
  
    const cursorDot = document.getElementById('cursorDot');
    window.addEventListener('mousemove', (e) => {
      cursorDot.classList.add('active');
      cursorDot.style.left = e.clientX + 'px';
      cursorDot.style.top = e.clientY + 'px';
    });
    window.addEventListener('mouseleave', () => cursorDot.classList.remove('active'));
    window.addEventListener('mousedown', () => {
      cursorDot.style.transform = 'translate(-50%,-50%) scale(0.86)';
    });
    window.addEventListener('mouseup', () => {
      cursorDot.style.transform = 'translate(-50%,-50%) scale(1)';
    });

  </script>
